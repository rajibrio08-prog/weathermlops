name: Build, Train Model and Push to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব রানারে কোড চেকআউট করা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ২. রানারের ভেতরে পাইথন সেটআপ করা (মডেল ট্রেইন করার জন্য)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # এখানে 'python-state' থেকে 'python-version' করা হয়েছে

    # ৩. প্রয়োজনীয় লাইব্রেরি ইনস্টল করা এবং মডেল ট্রেইন করা
    - name: Install Dependencies and Train Model
      env:
        # রানার এনভায়রনমেন্টের জন্য সরাসরি লোকাল sqlite এবং ফাইল স্টোর এলাও করা হলো
        MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
        MLFLOW_ALLOW_FILE_STORE: "true"
      run: |
        pip install pandas scikit-learn joblib mlflow
        python train.py
        # এই কমান্ডটি রান হওয়ার সাথে সাথে একদম নতুন weather_model.pkl তৈরি হয়ে যাবে

    # ৪. ডকার হাব অ্যাকাউন্টে লগইন করা
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: rajib1821
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # ৫. ডকার বিল্ডক্স (Buildx) সেটআপ করা
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ৬. নতুন তৈরি হওয়া .pkl ফাইলসহ ডকার ইমেজ বিল্ড ও পুশ করা
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: rajib1821/weathermlops:latest,rajib1821/weathermlops:${{ github.sha }}
