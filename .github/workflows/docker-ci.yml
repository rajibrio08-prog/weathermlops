name: Build and Push Weather ML Image to Docker Hub

# ১. পাইপলাইনটি কখন রান করবে (যখনই main ব্রাঞ্চে পুশ হবে)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # ২. গিটহাবের রানারে কোড চেকআউট করা
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ৩. ডকার হাব অ্যাকাউন্টে লগইন করা (গিটহাব সিক্রেটস ব্যবহার করে)
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: rajib1821
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # ৪. ডকার বিল্ডক্স (Buildx) সেটআপ করা (ভালো বিল্ড পারফরম্যান্সের জন্য)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ৫. ডকার ইমেজ বিল্ড এবং ডকার হাবে অটো পুশ করা
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: rajib1821/weathermlops:latest,rajib1821/weathermlops:${{ github.sha }}
